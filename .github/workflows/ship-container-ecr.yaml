name: Ship API Container to ECR
on:
  - push
jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26'
          cache: true
      - name: Run unit tests
        run: go test -race -v ./...

  build-image:
    runs-on: ubuntu-latest
    needs:
      - run-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Build API runner image
        run: >
          docker build
          -f Containerfile
          -t mks-api
          --target runner .
      - name: Save image as .tar file
        run: docker save mks-api -o mks-api.tar
      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mks-api-image
          path: mks-api.tar
          retention-days: 1

  push-to-ecr:
    runs-on: ubuntu-latest
    needs:
      - build-image
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: mks-api-image
      - name: Load image
        run: docker load -i mks-api.tar
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_WORKFLOWS_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Get short sha
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Tag and push image to ECR
        run: |
          docker tag mks-api ${{ vars.AWS_ECR_REPOSITORY_URL }}:latest
          docker tag mks-api ${{ vars.AWS_ECR_REPOSITORY_URL }}:${{ steps.sha.outputs.short }}
          docker push ${{ vars.AWS_ECR_REPOSITORY_URL }} --all-tags
